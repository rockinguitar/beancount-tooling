services:
  fava:
    image: beancount-tooling
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${FAVA_PORT:-5001}:5000"
    volumes:
      - ${FINANCE_DIR:-./example}:/ledger:ro
    environment:
      BEANCOUNT_FILENAME: ${BEANCOUNT_FILENAME:-test.beancount}
    command: >
      sh -lc 'fava -H 0.0.0.0 -p 5000 "/ledger/$$BEANCOUNT_FILENAME"'
    restart: unless-stopped

  beancount-tools:
    image: beancount-tooling
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ${FINANCE_DIR:-./example}:/ledger:ro
    environment:
      BEANCOUNT_FILENAME: ${BEANCOUNT_FILENAME:-test.beancount}
    profiles: ["tools"]
